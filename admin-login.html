  <style>

<body class="starter-page-page">

  <main class="main">
    <section id="starter-section" class="starter-section section" style="padding-top: 100px;">
      <div class="container login-container" data-aos="fade-up">
        <div class="login-card card p-4">

          <form id="adminLoginForm">
            <div class="form-group mb-3">
              <label for="email">Admin Email</label>
              <input type="email" class="form-control" id="email" placeholder="admin@tau.edu.ng" required autocomplete="email" autofocus>
            </div>

            <div class="form-group mb-3 password-container">
              <label for="password">Password</label>

                <i class="bi bi-eye-slash"></i>

            <button type="submit" class="btn btn-primary w-100" id="loginButton" style="background-color: #1b8c0c; border-color: #1b8c0c; padding: 12px;">
              Sign In

          <div class="text-center mt-3">

          <div class="text-center mt-4">

  <!-- Vendor js files-->

  <script src="assets/js/config.js"></script>
  <script type="module" src="assets/js/supabase-config.js"></script>


  <script type="module">
    import { supabase, checkAuth } from './assets/js/supabase-config.js';

    // ============================================
    // CONFIGURATION
    // ============================================
    const RATE_LIMIT_WINDOW = 15 * 60 * 1000; // 15 minutes
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_DURATION = 30 * 60 * 1000; // 30 minutes

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const loginForm = document.getElementById('adminLoginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const alertBanner = document.getElementById('alertBanner');
    const alertMessage = document.getElementById('alertMessage');

    // ============================================
    // RATE LIMITING FUNCTIONS
    // ============================================
    
    function getRateLimitKey(email) {
      return `admin_login_attempts_${email.toLowerCase()}`;
    }

    function checkRateLimit(email) {
      const key = getRateLimitKey(email);
      const attempts = JSON.parse(localStorage.getItem(key) || '{"count":0,"firstAttempt":null,"lockoutUntil":null}');
      
      // Check if currently locked out
      if (attempts.lockoutUntil && Date.now() < attempts.lockoutUntil) {
        const remainingMinutes = Math.ceil((attempts.lockoutUntil - Date.now()) / 60000);
        throw new Error(`Too many failed attempts. Account locked for ${remainingMinutes} minutes.`);
      }
      
      // Reset lockout if expired
      if (attempts.lockoutUntil && Date.now() >= attempts.lockoutUntil) {
        attempts.count = 0;
        attempts.firstAttempt = null;
        attempts.lockoutUntil = null;
        localStorage.setItem(key, JSON.stringify(attempts));
      }
      
      // Clean old attempts (older than window)
      if (attempts.firstAttempt && Date.now() - attempts.firstAttempt > RATE_LIMIT_WINDOW) {
        attempts.count = 0;
        attempts.firstAttempt = null;
      }
      
      if (attempts.count >= MAX_ATTEMPTS) {
        // Lock the account
        attempts.lockoutUntil = Date.now() + LOCKOUT_DURATION;
        localStorage.setItem(key, JSON.stringify(attempts));
        const lockoutMinutes = Math.ceil(LOCKOUT_DURATION / 60000);
        throw new Error(`Too many failed attempts. Account locked for ${lockoutMinutes} minutes.`);
      }
      
      return attempts;
    }

    function recordFailedAttempt(email) {
      const key = getRateLimitKey(email);
      const attempts = JSON.parse(localStorage.getItem(key) || '{"count":0,"firstAttempt":null,"lockoutUntil":null}');
      
      if (!attempts.firstAttempt) {
        attempts.firstAttempt = Date.now();
      }
      attempts.count++;
      localStorage.setItem(key, JSON.stringify(attempts));
      
      const remainingAttempts = MAX_ATTEMPTS - attempts.count;
      if (remainingAttempts > 0) {
        showAlert(`Warning: ${remainingAttempts} login attempt${remainingAttempts !== 1 ? 's' : ''} remaining before account lock.`, 'warning');
      }
    }

    function clearFailedAttempts(email) {
      const key = getRateLimitKey(email);
      localStorage.removeItem(key);
    }

    function showAlert(message, type = 'warning') {
      alertMessage.textContent = message;
      alertBanner.style.display = 'block';
      
      if (type === 'error') {
        alertBanner.style.background = '#f8d7da';
        alertBanner.style.borderColor = '#f5c6cb';
        alertBanner.style.color = '#721c24';
      } else {
        alertBanner.style.background = '#fff3cd';
        alertBanner.style.borderColor = '#ffecb5';
        alertBanner.style.color = '#856404';
      }
      
      setTimeout(() => {
        alertBanner.style.display = 'none';
      }, 5000);
    }

    // ============================================
    // SESSION CHECK - Redirect if already logged in
    // ============================================
    
    async function checkExistingAdminSession() {
      try {
        const session = await checkAuth();
        if (session) {
          // Check if user is an admin
          const { data: adminData, error } = await supabase
            .from('admin_users')
            .select('id, role')
            .eq('user_id', session.user.id)
            .single();
          
          if (!error && adminData) {
            // Already logged in as admin, redirect to dashboard
            window.location.href = 'admin-dashboard.html';
          }
        }
      } catch (error) {
        console.error('Session check error:', error);
      }
    }
    
    // Run session check immediately
    checkExistingAdminSession();

    // ============================================
    // PASSWORD TOGGLE
    // ============================================
    
    const togglePassword = document.getElementById('toggle-password');
    togglePassword.addEventListener('click', function() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.innerHTML = '<i class="bi bi-eye"></i>';
      } else {
        passwordInput.type = 'password';
        togglePassword.innerHTML = '<i class="bi bi-eye-slash"></i>';
      }
    });

    // ============================================
    // FORM SUBMISSION
    // ============================================
    
    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
    console.log('Form submitted!');  // ← ADD THIS
    console.log('Email:', emailInput.value);  // ← ADD THIS
    console.log('Password length:', passwordInput.value.length);  // ← ADD THIS
      
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      
      // Validate inputs
      if (!email || !password) {
        Swal.fire({
          title: 'Missing Information',
          text: 'Please enter both email and password.',
          icon: 'warning',
          confirmButtonText: 'OK'
        });
        return;
      }
      
      // Validate email format
      const emailRegex = /^[^\s@]+@([^\s@]+\.)?tau\.edu\.ng$/;
      if (!emailRegex.test(email)) {
        Swal.fire({
          title: 'Invalid Email',
          text: 'Please use a valid admin email address (@tau.edu.ng).',
          icon: 'warning',
          confirmButtonText: 'OK'
        });
        return;
      }
      
      // Check rate limit
      try {
        checkRateLimit(email);
      } catch (error) {
        Swal.fire({
          title: 'Account Temporarily Locked',
          text: error.message,
          icon: 'error',
          confirmButtonText: 'OK'
        });
        return;
      }
      
      // Show loading state
      loginButton.disabled = true;
      loginButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
      
      try {
        // Attempt login
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          recordFailedAttempt(email);
          throw error;
        }
        
        // Check if user is an admin
        const { data: adminData, error: adminError } = await supabase
          .from('admin_users')
          .select('id, role, email, name')
          .eq('user_id', data.user.id)
          .single();
        
        if (adminError || !adminData) {
          // User is not an admin - sign them out
          await supabase.auth.signOut();
          recordFailedAttempt(email);
          throw new Error('UNAUTHORIZED');
        }
        
        // Login successful - clear rate limit
        clearFailedAttempts(email);
        
        // Store admin session data
        sessionStorage.setItem('adminSession', JSON.stringify({
          userId: data.user.id,
          adminId: adminData.id,
          role: adminData.role,
          email: adminData.email,
          name: adminData.name,
          loginTime: Date.now()
        }));
        
        // Show success message
        await Swal.fire({
          title: 'Welcome Back!',
          text: `Signed in as ${adminData.name || adminData.email}`,
          icon: 'success',
          timer: 1500,
          showConfirmButton: false
        });
        
        // Redirect to admin dashboard
        window.location.href = 'admin-dashboard.html';
        
      } catch (err) {
        console.error('Login error:', err);
        
        let errorMessage = 'Invalid admin credentials. Please try again.';
        if (err.message === 'UNAUTHORIZED') {
          errorMessage = 'Access denied. You do not have admin privileges.';
        } else if (err.message === 'Invalid login credentials') {
          errorMessage = 'Invalid email or password. Please try again.';
        } else if (err.message.includes('locked')) {
          errorMessage = err.message;
        }
        
        Swal.fire({
          title: 'Login Failed',
          text: errorMessage,
          icon: 'error',
          confirmButtonText: 'Try Again'
        });
        
      } finally {
        loginButton.disabled = false;
        loginButton.innerHTML = 'Sign In';
      }
    });
    
    // ============================================
    // CLEANUP OLD RATE LIMIT DATA (Optional)
    // ============================================
    
    function cleanupOldRateLimitData() {
      const keys = Object.keys(localStorage);
      const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
      
      keys.forEach(key => {
        if (key.startsWith('admin_login_attempts_')) {
          const data = JSON.parse(localStorage.getItem(key));
          if (data.firstAttempt && data.firstAttempt < oneDayAgo) {
            localStorage.removeItem(key);
          }
        }
      });
    }
    
    // Run cleanup on page load
    cleanupOldRateLimitData();
    
    // ============================================
    // ADDITIONAL SECURITY: Disable browser autofill styling
    // ============================================
    
    // Prevent browser from autofilling password on page load
    setTimeout(() => {
      passwordInput.value = '';
    }, 100);
    
  </script>
